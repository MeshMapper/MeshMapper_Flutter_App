name: mesh_mapper
description: MeshMapper - Cross-platform wardriving app for MeshCore devices
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.32.0
  flutter_web_bluetooth: ^0.2.3
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.0
  permission_handler: ^11.3.0
  uuid: ^4.3.0
  pointycastle: ^3.7.0
  intl: ^0.19.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/device-models.json
